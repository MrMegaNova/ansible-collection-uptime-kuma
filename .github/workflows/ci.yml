---
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ansible-lint (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core ansible-lint
      - run: ansible-lint --profile production

  sanity:
    name: ansible-test sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/mrmeganova/uptime_kuma
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core
      - name: Run sanity tests
        working-directory: ansible_collections/mrmeganova/uptime_kuma
        run: ansible-test sanity --docker -v

  publish:
    name: Build & publish to Galaxy
    needs: [lint, sanity]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core
      - name: Build collection
        run: ansible-galaxy collection build --output-path ./dist
      - name: Publish collection
        run: >-
          ansible-galaxy collection publish
          ./dist/mrmeganova-uptime_kuma-*.tar.gz
          --api-key "${{ secrets.GALAXY_API_KEY }}"
