ancestor: null
releases:
  0.1.0:
    changes:
      minor_changes:
      - maintenance module to manage maintenance windows in the ``manual`` strategy
        (creation, monitor assignment by name, enable/disable, deletion). Tested against
        Uptime Kuma 2.4.0.
      release_summary: Initial release.
    release_date: '2026-07-02'
  0.2.0:
    changes:
      minor_changes:
      - maintenance module switches to a self-expiring window (``single`` strategy,
        ``duration_minutes``) instead of the enable/disable ``manual`` pair. The window
        persists across an Uptime Kuma restart and expires on its own.
    release_date: '2026-07-02'
  0.3.0:
    changes:
      minor_changes:
      - maintenance module can attach the window to status pages via ``status_pages``
        (by title or slug) or ``all_status_pages``. Idempotent assignment.
    release_date: '2026-07-02'
  0.4.0:
    changes:
      minor_changes:
      - Added the ``uptime_kuma`` action group, so ``module_defaults`` can set the
        connection options once for every module.
      - Connection options are now provided by a shared documentation fragment (``mrmeganova.uptime_kuma.connection``)
        and a ``connection_argument_spec()`` helper.
      - New tag module to create, update and delete Uptime Kuma tags.
    release_date: '2026-07-02'
  0.5.0:
    changes:
      minor_changes:
      - New monitor module to create, update and delete monitors.
      - New notification module to create, update and delete notifications.
      - New status_page module to create, update and delete status pages, including
        the monitors shown on the page.
    release_date: '2026-07-02'
  0.6.0:
    changes:
      minor_changes:
      - New info module for read-only gathering of monitors, status pages, notifications,
        tags and maintenance windows.
      - maintenance module gains ``state=paused``, which ensures the window exists
        but is paused and keeps its scope in sync without resetting the time window.
    release_date: '2026-07-02'
  0.7.0:
    changes:
      minor_changes:
      - All mutating modules (maintenance, tag, notification, monitor, status_page)
        now support diff mode; run with ``--diff`` to preview the before/after state.
      - The changelog is now generated from ``changelogs/fragments/`` with antsibull-changelog
        instead of being edited by hand.
      release_summary: 'Adds diff mode to the mutating modules and moves changelog
        management to

        antsibull-changelog fragments.'
    fragments:
    - 0.7.0-diff-and-changelog.yml
    release_date: '2026-07-02'
